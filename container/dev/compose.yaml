services:
  dev:
    build:
      context: ../..
      dockerfile: container/dev/Containerfile
      args:
        DEV_UID: ${DEV_UID:-1000}
        DEV_GID: ${DEV_GID:-1000}
    image: devcontainer:latest
    container_name: devcontainer
    hostname: devcontainer
    stdin_open: true
    tty: true

    env_file:
      - .env

    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 100

    volumes:
      - ${SSH_DIR:-~/.ssh}:/home/dev/.ssh:ro
      - dotfiles:/home/dev/dotfiles
      - node_modules:/home/dev/app/node_modules
      - pnpm_store:/home/dev/.local/share/pnpm/store

    working_dir: /home/dev/app
    ports:
      - "3000:3000"

volumes:
  dotfiles:
  node_modules:
  pnpm_store:
