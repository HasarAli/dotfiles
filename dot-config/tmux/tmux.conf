# =============================================================================
# Prefix & mouse
# =============================================================================

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g mouse on

# Avoid vim ESC delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

bind r source-file ~/.config/tmux/tmux.conf \; display-message 'tmux.conf reloaded ✓'

# =============================================================================
# Window & pane behavior
# =============================================================================

# Start at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Re-number windows when one is closed
set-option -g renumber-windows on

set -g history-limit 50000
setw -g aggressive-resize on

# =============================================================================
# Pane navigation
# =============================================================================

# Window nav with prefix (capital = same as lowercase)
bind h previous-window
bind l next-window
bind H previous-window
bind L next-window

# Split in current pane's cwd
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# \ / - split (new pane); | / _ join the marked pane (prefix m to mark first).
bind \\  split-window -h -c "#{pane_current_path}"
bind -   split-window -v -c "#{pane_current_path}"
bind |   join-pane -h
bind _   join-pane -v

# Swap current pane with the marked pane (prefix m to mark first).
bind Tab swap-pane

# =============================================================================
# Window navigation
# =============================================================================

# Shift-arrow (no prefix)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Open new window in current directory
bind c new-window -c "#{pane_current_path}"

# Kill current window (all panes in it)
bind k confirm-before -p "kill window? (y/n)" "kill-window"

# Kill all windows except the current one
bind K confirm-before -p "kill other windows? (y/n)" "kill-window -a"

# Kill all panes in current window except the current one
bind X confirm-before -p "kill other panes? (y/n)" "kill-pane -a"

# =============================================================================
# Terminal features & clipboard (OSC 52)
# OSC 52 is a terminal escape sequence that tells the terminal to write text
# into the system clipboard. It works over SSH/ttyd with no xclip/xsel needed.
# =============================================================================

# Use tmux-256color terminfo inside panes (richer than default screen-256color:
# italics, better cursor shapes, proper capability reporting).
set -g default-terminal "tmux-256color"

# Advertise truecolor (xterm-256color only) and OSC 52 clipboard (any xterm*
# variant — TTYD reports plain `xterm` in some shells; alacritty for local use).
# Without the clipboard feature tmux drops OSC 52 from inner apps (e.g. nvim
# yank) instead of forwarding it to the outer terminal.
set -sa terminal-features ",xterm-256color:RGB"
set -sa terminal-features "xterm*:clipboard"
set -sa terminal-features "alacritty*:clipboard"

# Forward modified keys (CSI-u) through tmux so e.g. Shift+Enter reaches inner
# apps as a distinct key instead of being flattened to a plain Enter. Required
# for Claude Code's multiline binding (Alacritty sends Shift+Enter as ESC CR).
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features "xterm*:extkeys"

# Let inner apps emit raw DCS escape sequences straight to the outer terminal
# (graphics protocols, OSC passthrough) instead of tmux swallowing them.
set -g allow-passthrough on

# Don't use synchronized output (DEC mode 2026) with Alacritty: it holds the
# last frame until an end-sync arrives, and with heavy 2026 users inside panes
# (nvim termsync, Claude Code) the display can stick on a stale frame until a
# resize/window switch forces a full repaint. Sync@ cancels the capability.
set -as terminal-overrides ',alacritty*:Sync@'

# Accept OSC 52 from apps inside panes (e.g. nvim yank): tmux stores it in a
# paste buffer AND re-emits it to the outer terminal (Alacritty / ttyd's
# xterm.js, which calls navigator.clipboard.writeText()). NOTE: "external"
# does NOT do this — it only sets the outer clipboard for tmux's own copy
# operations and silently ignores OSC 52 from inner applications.
set -s set-clipboard on

# =============================================================================
# Vi copy mode
# =============================================================================

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi V   send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# On yank, emit OSC 52 directly to the terminal device:
#   printf "\e]52;c;%s\a"  — OSC 52 targeting system clipboard (c), with a
#                             BEL (\a) terminator; %s is filled with the payload
#   $(base64 -w 0)         — reads the yanked text from stdin and base64-encodes
#                             it; -w 0 disables line wrapping (wraps break the sequence)
#   > #{client_tty}        — writes directly to the terminal device file; tmux
#                             captures normal stdout so we must bypass it this way
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \
    'printf "\e]52;c;%s\a" "$(base64 -w 0)" > #{client_tty}'

# =============================================================================
# Status bar
# =============================================================================

set -g display-time 4000
set -g status-interval 5

# emacs bindings in the command prompt (prefix + :) are nicer than vi
set -g status-keys emacs

# =============================================================================
# Theme
# =============================================================================

set -g @catppuccin_flavor 'mocha'

# =============================================================================
# Plugins
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-dir ~/.local/share/tmux/sessions

# tmux 3.7 regression: select-layout no longer rescales a restored layout to
# the current window, so panes restore at the saved size and nothing — not
# typing, visiting the window, or zoom — refits them (3.6b and earlier
# rescaled). resize-window -A forces the refit; the -u window-size afterwards
# is required because resize-window flips the window to window-size=manual,
# which would silently stop it following future client resizes.
set -g @resurrect-hook-post-restore-all 'for w in $(tmux list-windows -a -F "#{window_id}"); do tmux resize-window -A -t "$w"; tmux set-option -w -t "$w" -u window-size; done'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'watch'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# Auto-restore previous session on tmux start, auto-save every 15 minutes.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM — must stay at the very bottom
run '${XDG_CONFIG_HOME:-$HOME/.config}/tmux/plugins/tpm/tpm'

# =============================================================================
# Pane border emphasis (after plugins so it overrides catppuccin)
# =============================================================================

set -g pane-border-lines single
set -g pane-active-border-style "fg=#f5c2e7"
set -g pane-border-style "fg=#45475a"
set -g pane-border-status top

# Dim inactive pane content so active pane pops
set -g window-style "fg=#7f849c,bg=#1e1e2e"
set -g window-active-style "fg=#cdd6f4,bg=#1e1e2e"

# =============================================================================
# Window state pill + terminal-title marker
# =============================================================================
# Set @notify_state via utils/tmux-notify/tmux_notify.py — pill on
# non-current windows + (!N,✓M) prefix on the terminal title. Cleared when
# the window is focused (window switch or OS focus). Pill: red=needs-input,
# blue=done.
#
# @is_window_focused is tracked per-window by the pane-focus-in/out hooks
# below and read by tmux_notify.py to no-op when the user is already looking
# at the target window (avoids spurious pill/title updates for the focused
# window).

set -g focus-events on

# pane-focus-in/out alone covers OS terminal focus, browser tab focus, pane
# switches within a window, AND tmux window switches — so no separate
# session-window-changed hook is needed.
# pane-focus-in:  set @is_window_focused=1, then clear @notify_state, then
#                 refresh the terminal title.
# pane-focus-out: unset @is_window_focused, then clear @notify_state, then
#                 refresh the terminal title.
# Chain order matters: the title script reads @notify_state, so the unset
# must happen before the refresh.
# run-shell wrap: hook ctx doesn't expand #{window_id}; run-shell args do.
set-hook -g pane-focus-in          "run-shell -b \"tmux set-option -wq -t '#{window_id}' @is_window_focused 1 && tmux set-option -uwq -t '#{window_id}' @notify_state && $HOME/.config/tmux/utils/tmux-notify/update_terminal_title.py --session-id '#{session_id}'\""
set-hook -g pane-focus-out         "run-shell -b \"tmux set-option -uwq -t '#{window_id}' @is_window_focused 1 && tmux set-option -uwq -t '#{window_id}' @notify_state && $HOME/.config/tmux/utils/tmux-notify/update_terminal_title.py --session-id '#{session_id}'\""


set -g window-status-format "#{?#{@notify_state},#[fg=#{@thm_crust} bg=#{?#{==:#{@notify_state},done},#{@thm_blue},#{@thm_red}} bold] 󰂞 #I  #T ,#[fg=#11111b bg=#{@thm_overlay_2}] #I #[fg=#cdd6f4 bg=#{@thm_surface_0}] #T }"
set -g window-status-current-format "#[fg=#11111b bg=#{@thm_mauve}] #I #[fg=#cdd6f4 bg=#{@thm_surface_1}] #T "
