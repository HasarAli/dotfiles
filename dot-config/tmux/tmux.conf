# =============================================================================
# Prefix & mouse
# =============================================================================

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g mouse on

# =============================================================================
# Window & pane numbering
# =============================================================================

# Start at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Re-number windows when one is closed
set-option -g renumber-windows on

# =============================================================================
# Pane navigation
# =============================================================================

# Window nav with prefix (capital = same as lowercase)
bind h previous-window
bind l next-window
bind H previous-window
bind L next-window

# Split in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# Pull a pane from another window into the current one (horizontal layout)
bind J command-prompt -p "Join pane from window:" "join-pane -h -s '%%'"

# Send current pane to another window (horizontal layout)
bind o command-prompt -p "Send pane to window:" "join-pane -h -t '%%'"

# =============================================================================
# Window navigation
# =============================================================================

# Shift-arrow (no prefix)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Open new window in current directory
bind c new-window -c "#{pane_current_path}"

# Kill current window (all panes in it)
bind k confirm-before -p "kill window? (y/n)" "kill-window"

# Kill all windows except the current one
bind K confirm-before -p "kill other windows? (y/n)" "kill-window -a"

# Kill all panes in current window except the current one
bind X confirm-before -p "kill other panes? (y/n)" "kill-pane -a"

# =============================================================================
# Clipboard (OSC 52)
# OSC 52 is a terminal escape sequence that tells the terminal to write text
# into the system clipboard. It works over SSH/ttyd with no xclip/xsel needed.
# Applies to terminals where $TERM matches xterm* (xterm, xterm-256color, etc.)
# =============================================================================

# For xterm* terminals, advertise two capabilities:
#   Tc        — true color (24-bit RGB) support
#   Ms=...    — the escape sequence tmux should emit to set the clipboard
#
# The Ms sequence is the OSC 52 format:
#   \E]52;    — ESC + ]52; = "Operating System Command 52" (clipboard)
#   %p1%s     — first argument: clipboard target ("c" = system clipboard)
#   %p2%s     — second argument: base64-encoded text to place in the clipboard
#   \007      — BEL character, terminates the OSC sequence
set-option -sa terminal-overrides ",xterm*:Tc:Ms=\E]52;%p1%s;%p2%s\007"

# Pass OSC 52 through to the outer terminal instead of tmux intercepting it.
# Needed for ttyd/xterm.js so the browser receives the sequence and can call
# navigator.clipboard.writeText().
set -s set-clipboard external

# On every yank, manually emit the OSC 52 sequence to the terminal device:
#   printf "\e]52;c;%s\a"  — OSC 52 targeting system clipboard (c), with a
#                             BEL (\a) terminator; %s is filled with the payload
#   $(base64 -w 0)         — reads the yanked text from stdin and base64-encodes
#                             it; -w 0 disables line wrapping (wraps break the sequence)
#   > #{client_tty}        — writes directly to the terminal device file; tmux
#                             captures normal stdout so we must bypass it this way
set -g @override_copy_command 'printf "\e]52;c;%s\a" "$(base64 -w 0)" > #{client_tty}'

# Apply the same OSC 52 emission for mouse drag selections, not just keyboard yanks
set -g @yank_with_mouse on
set -g @yank_selection_mouse clipboard

# =============================================================================
# Vi copy mode
# =============================================================================

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Fallback: emit OSC 52 directly on 'y' in case tmux-yank isn't loaded.
# tmux-yank overrides this at startup via @override_copy_command.
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \
    'printf "\e]52;c;%s\a" "$(base64 -w 0)" > #{client_tty}'

# =============================================================================
# Theme
# =============================================================================

set -g @catppuccin_flavor 'mocha'

# =============================================================================
# Plugins
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TPM — must stay at the very bottom
run '${XDG_CONFIG_HOME:-$HOME/.config}/tmux/plugins/tpm/tpm'

# =============================================================================
# Pane border emphasis (after plugins so it overrides catppuccin)
# =============================================================================

set -g pane-border-lines heavy
set -g pane-active-border-style "fg=#f5c2e7,bold"
set -g pane-border-style "fg=#45475a"
set -g pane-border-status top

# Dim inactive pane content so active pane pops
set -g window-style "fg=#7f849c,bg=#1e1e2e"
set -g window-active-style "fg=#cdd6f4,bg=#1e1e2e"
